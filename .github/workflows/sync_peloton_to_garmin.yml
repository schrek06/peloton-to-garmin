name: Sync Peloton to Garmin
on:
  schedule:
    - cron: '0 */1 * * *'  # Runs hourly (adjust as needed)
  workflow_dispatch:
jobs:
  sync-peloton-to-garmin:
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIR: /app/output 
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'  # Match P2G requirements
      - name: Create Output Directory
        run: mkdir -p "$OUTPUT_DIR"  # Ensure the directory exists
      - name: Sync Peloton workouts
        env:
          PELOTON_USERNAME: ${{ secrets.PELOTON_USERNAME }}
          PELOTON_PASSWORD: ${{ secrets.PELOTON_PASSWORD }}
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: dotnet run --project ./src/PelotonToGarminConsole -- --output "$OUTPUT_DIR"
      - name: Zip Output Files
        run: zip -r output.zip "$OUTPUT_DIR"
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: FitFiles
          path: output.zip
          retention-days: 5
